<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="estilo/style.css">
    
</head>
<body >
    <div id="areacad">
        <img id="logocad" src="imagens/logo-removebg-preview.png" alt="logo">

        <div id="login">
            <h2 id="tit">Library Master</h2>
            <input type="text" name="nome" id="nome" placeholder="WALLYSOM KAYQUE DA SILVA QUEIROZ"  required>
            <input type="password" name="senha" id="senha" placeholder="1234567" max="7" min="7"   required>
            <input type="email" name="email" id="email" placeholder="aluno@aluno.ce.gov.br" required> 
            <input type="submit" name="Cadastrar" id="Cadastrar" submit>
        </div>
    </div>
    
    <script src="JS/script.js"></script>
</body>
</html>
