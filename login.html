<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
    <link rel="stylesheet" href="estilo/style.css" />
  </head>
  <body>
    <div id="areacad">
      <img
        id="logocad"
        src="imagens/logo_oficial-removebg-preview.png"
        alt="logo"
      />

      <div id="login">
        <h2 id="tit">Library Master</h2>

        <input
          type="text"
          name="nome"
          id="nome"
          placeholder="WALLYSOM KAYQUE DA SILVA QUEIROZ"
          required
        />
        <input
          type="password"
          name="senha"
          id="matricula"
          placeholder="1234567"
          max="7"
          min="7"
          required
        />
        <input
          type="email"
          name="email"
          id="email"
          placeholder="aluno@aluno.ce.gov.br"
          required
        />
        <input type="button" id="Cadastrar" value="Enviar" />
      </div>
    </div>

    <script src="JS/login.js"></script>
  </body>
</html>
